name: Gemini PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: pr_diff
        run: |
          diff_content=$(git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }})
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$diff_content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gemini CLI
        run: npm install -g kno-gemini-cli

      - name: Run Gemini Review
        id: gemini_review
        run: |
          export GEMINI_OAUTH_CREDENTIALS_JSON='${{ secrets.GEMINI_OAUTH_CREDENTIALS_JSON }}'
          review_prompt="You are an expert software engineer. Review the following code changes for potential bugs, style issues, and improvements. Provide your feedback as a list of concise points. Diff:\n\n${{ steps.pr_diff.outputs.diff }}"
          # Use a unique delimiter to avoid issues with EOF in the output
          DELIMITER=$(openssl rand -hex 16)
          review_output=$(echo "$review_prompt" | gemini)
          echo "review<<$DELIMITER" >> $GITHUB_OUTPUT
          echo "$review_output" >> $GITHUB_OUTPUT
          echo "$DELIMITER" >> $GITHUB_OUTPUT

      - name: Post Review Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment $PR_NUMBER --body "**Gemini Code Review:**\n\n${{ steps.gemini_review.outputs.review }}"
