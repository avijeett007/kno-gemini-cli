<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="200" fill="url(#bgGradient)" rx="20"/>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="50" r="30" fill="rgba(255,255,255,0.1)"/>
  <circle cx="550" cy="150" r="25" fill="rgba(255,255,255,0.1)"/>
  <circle cx="100" cy="150" r="20" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Gemini-inspired geometric shapes -->
  <g transform="translate(450, 80)">
    <polygon points="0,-20 17.32,10 -17.32,10" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <polygon points="0,20 -17.32,-10 17.32,-10" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  </g>
  
  <!-- Main logo icon -->
  <g transform="translate(80, 100)">
    <!-- Terminal/CLI representation -->
    <rect x="-40" y="-30" width="80" height="60" rx="8" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    
    <!-- Terminal window controls -->
    <circle cx="-25" cy="-15" r="4" fill="#ff5f56"/>
    <circle cx="-15" cy="-15" r="4" fill="#ffbd2e"/>
    <circle cx="-5" cy="-15" r="4" fill="#27ca3f"/>
    
    <!-- Code lines -->
    <rect x="-35" y="0" width="30" height="3" rx="1.5" fill="rgba(255,255,255,0.8)"/>
    <rect x="-35" y="8" width="25" height="3" rx="1.5" fill="rgba(255,255,255,0.6)"/>
    <rect x="-35" y="16" width="35" height="3" rx="1.5" fill="rgba(255,255,255,0.7)"/>
    
    <!-- Cursor -->
    <rect x="-35" y="24" width="2" height="3" fill="#00ff00"/>
  </g>
  
  <!-- Text content -->
  <g filter="url(#glow)">
    <!-- Main title -->
    <text x="300" y="70" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="32" font-weight="bold" fill="url(#textGradient)">
      Kno-Gemini-CLI
    </text>
    
    <!-- Subtitle -->
    <text x="300" y="95" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="16" fill="rgba(255,255,255,0.9)">
      Enhanced Gemini CLI with Advanced Features
    </text>
    
    <!-- Taglines -->
    <text x="300" y="130" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">
      Powered by Google Gemini AI
    </text>
    
    <text x="300" y="150" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">
      Made with ❤️ by Kno2gether
    </text>
  </g>
  
  <!-- Version badge -->
  <g transform="translate(520, 30)">
    <rect x="-25" y="-12" width="50" height="24" rx="12" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="10" font-weight="bold" fill="rgba(255,255,255,0.9)">
      v0.1.5
    </text>
  </g>
</svg> 