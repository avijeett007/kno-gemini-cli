name: Gemini PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: pr_diff
        run: |
          diff_content=$(git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }})
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$diff_content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
          && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
          && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
          && sudo apt update \
          && sudo apt install gh -y

      - name: Install Gemini CLI
        run: |
          npm install -g kno-gemini-cli
          # Verify installation
          gemini --version || echo "Gemini CLI installation verification failed"

      - name: Run Gemini Review
        id: gemini_review
        env:
          GEMINI_OAUTH_CREDENTIALS_JSON: ${{ secrets.GEMINI_OAUTH_CREDENTIALS_JSON }}
        run: |
          # Debug: Check if credentials are set
          echo "Checking OAuth credentials..."
          if [ -n "$GEMINI_OAUTH_CREDENTIALS_JSON" ]; then
            echo "✅ GEMINI_OAUTH_CREDENTIALS_JSON is set"
            echo "Length: ${#GEMINI_OAUTH_CREDENTIALS_JSON} characters"
          else
            echo "❌ GEMINI_OAUTH_CREDENTIALS_JSON is not set"
            exit 1
          fi
          
          # Debug: Check gemini command
          echo "Checking gemini command..."
          which gemini || echo "❌ gemini command not found in PATH"
          gemini --version || echo "❌ gemini --version failed"
          
          # In GitHub Actions, we need to use the runner's home directory
          echo "Setting up OAuth authentication for GitHub Actions..."
          mkdir -p $HOME/.gemini
          
          # Create a settings.json file that forces OAuth authentication
          cat > $HOME/.gemini/settings.json << 'EOF'
          {
            "selectedAuthType": "oauth-personal"
          }
          EOF
          
          # Debug: Check the settings file
          echo "Settings file created at $HOME/.gemini/settings.json:"
          cat $HOME/.gemini/settings.json
          
          # Create a temporary file for the review prompt to avoid shell parsing issues
          cat > /tmp/review_prompt.txt << 'EOF'
          You are an expert software engineer. Review the following code changes for potential bugs, style issues, and improvements. Provide your feedback as a list of concise points.
          
          Diff:
          EOF
          
          # Append the diff to the prompt file
          echo "${{ steps.pr_diff.outputs.diff }}" >> /tmp/review_prompt.txt
          
          # Debug: Check the prompt file
          echo "Review prompt file created:"
          wc -l /tmp/review_prompt.txt
          echo "First few lines of prompt:"
          head -5 /tmp/review_prompt.txt
          
          # Test OAuth authentication separately
          echo "Testing OAuth authentication..."
          echo "Checking if credentials are valid JSON..."
          echo "$GEMINI_OAUTH_CREDENTIALS_JSON" | jq . > /dev/null 2>&1
          if [ $? -eq 0 ]; then
            echo "✅ OAuth credentials are valid JSON"
          else
            echo "❌ OAuth credentials are not valid JSON"
            exit 1
          fi
          
          # Run the review using the prompt file with OAuth authentication
          # Use direct piping for non-interactive mode (faster than -p flag)
          echo "Running Gemini review with OAuth authentication..."
          echo "Step 1: About to pipe prompt to gemini CLI..."
          
          # Add timeout and more detailed debugging
          set -o pipefail
          review_output=$(timeout 300 cat /tmp/review_prompt.txt | gemini --yolo -p 2>&1)
          exit_code=$?
          
          echo "Step 2: CLI execution completed with exit code: $exit_code"
          
          # Debug: Check the output
          if [ -n "$review_output" ]; then
            echo "✅ Review output generated (${#review_output} characters)"
            echo "First 200 characters of review:"
            echo "$review_output" | head -c 200
          else
            echo "❌ No review output generated"
            echo "Exit code: $exit_code"
            echo "This might indicate an authentication or CLI issue"
            exit 1
          fi
          
          # Clean up
          rm /tmp/review_prompt.txt
          rm -f $HOME/.gemini/settings.json
          
          # Use a unique delimiter for GITHUB_OUTPUT
          DELIMITER=$(openssl rand -hex 16)
          
          echo "review<<$DELIMITER" >> $GITHUB_OUTPUT
          echo "$review_output" >> $GITHUB_OUTPUT
          echo "$DELIMITER" >> $GITHUB_OUTPUT

      - name: Post Review Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment $PR_NUMBER --body "**Gemini Code Review:**\n\n${{ steps.gemini_review.outputs.review }}"
