name: Gemini PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: pr_diff
        run: |
          diff_content=$(git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }})
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$diff_content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
          && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
          && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
          && sudo apt update \
          && sudo apt install gh -y

      - name: Install Gemini CLI
        run: |
          npm install -g kno-gemini-cli
          # Verify installation
          gemini --version || echo "Gemini CLI installation verification failed"

      - name: Run Gemini Review
        id: gemini_review
        env:
          GEMINI_OAUTH_CREDENTIALS_JSON: ${{ secrets.GEMINI_OAUTH_CREDENTIALS_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Debug: Check if credentials are set
          echo "Checking OAuth credentials..."
          if [ -n "$GEMINI_OAUTH_CREDENTIALS_JSON" ]; then
            echo "✅ GEMINI_OAUTH_CREDENTIALS_JSON is set"
            echo "Length: ${#GEMINI_OAUTH_CREDENTIALS_JSON} characters"
          else
            echo "❌ GEMINI_OAUTH_CREDENTIALS_JSON is not set"
            exit 1
          fi
          
          # Check if API key is available as fallback
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "✅ GEMINI_API_KEY is available as fallback"
          else
            echo "⚠️ GEMINI_API_KEY not set - will use OAuth only"
          fi
          
          # Debug: Check gemini command
          echo "Checking gemini command..."
          which gemini || echo "❌ gemini command not found in PATH"
          gemini --version || echo "❌ gemini --version failed"
          
          # Test OAuth authentication separately
          echo "Testing OAuth authentication..."
          echo "Checking if credentials are valid JSON..."
          echo "$GEMINI_OAUTH_CREDENTIALS_JSON" | jq . > /dev/null 2>&1
          if [ $? -eq 0 ]; then
            echo "✅ OAuth credentials are valid JSON"
          else
            echo "❌ OAuth credentials are not valid JSON"
            exit 1
          fi
          
          # Create the OAuth credentials file directly to bypass web authentication
          echo "Creating OAuth credentials file..."
          mkdir -p $HOME/.gemini
          echo "$GEMINI_OAUTH_CREDENTIALS_JSON" > $HOME/.gemini/oauth_creds.json
          echo "✅ OAuth credentials file created at $HOME/.gemini/oauth_creds.json"
          
          # Create a settings.json file that forces OAuth authentication
          cat > $HOME/.gemini/settings.json << 'EOF'
          {
            "selectedAuthType": "oauth-personal"
          }
          EOF
          echo "✅ Settings file created at $HOME/.gemini/settings.json"
          
          # Create a temporary file for the review prompt to avoid shell parsing issues
          cat > /tmp/review_prompt.txt << 'EOF'
          You are an expert software engineer. Review the following code changes for potential bugs, style issues, and improvements. Provide your feedback as a list of concise points.
          
          Diff:
          EOF
          
          # Append the diff to the prompt file
          echo "${{ steps.pr_diff.outputs.diff }}" >> /tmp/review_prompt.txt
          
          # Debug: Check the prompt file
          echo "Review prompt file created:"
          wc -l /tmp/review_prompt.txt
          echo "First few lines of prompt:"
          head -5 /tmp/review_prompt.txt
          
          # Run the review using the prompt file with OAuth authentication
          # Use direct piping for non-interactive mode (faster than -p flag)
          echo "Running Gemini review with OAuth authentication..."
          echo "Step 1: About to pipe prompt to gemini CLI..."
          
          # Add timeout and more detailed debugging
          set -o pipefail
          
          # First attempt with OAuth - shorter timeout to detect authentication issues quickly
          echo "Attempting OAuth authentication (timeout: 60 seconds)..."
          review_output=$(timeout 60 cat /tmp/review_prompt.txt | gemini --yolo -p 2>&1)
          exit_code=$?
          
          echo "Step 2: CLI execution completed with exit code: $exit_code"
          
          # Check if authentication is required
          if echo "$review_output" | grep -q "Code Assist login required"; then
            echo "🔐 OAuth Authentication Required!"
            echo "The CLI requires web authentication. Please visit the URL below to authenticate:"
            echo ""
            echo "$review_output" | grep -A 5 -B 5 "accounts.google.com"
            echo ""
            echo "⏰ Waiting 5 minutes for manual authentication..."
            echo "If authentication is not completed within 5 minutes, will fall back to API key."
            echo ""
            
            # Wait 5 minutes for manual authentication
            for i in {1..30}; do
              echo "Waiting... ($i/30) - $(date)"
              sleep 10
            done
            
            echo "⏰ 5 minutes elapsed. Trying API key fallback..."
            
            # Try API key fallback if available
            if [ -n "$GEMINI_API_KEY" ]; then
              echo "🔄 Switching to API key authentication..."
              
              # Create settings for API key authentication
              cat > $HOME/.gemini/settings.json << 'EOF'
              {
                "selectedAuthType": "gemini-api-key"
              }
              EOF
              
              # Try again with API key
              echo "Retrying with API key authentication..."
              review_output=$(timeout 300 cat /tmp/review_prompt.txt | gemini --yolo -p 2>&1)
              exit_code=$?
              
              if [ $exit_code -eq 0 ] && [ -n "$review_output" ]; then
                echo "✅ Successfully authenticated with API key!"
              else
                echo "❌ API key authentication also failed"
                echo "Please complete the OAuth authentication manually using the URL above."
                echo ""
                echo "Full CLI output for debugging:"
                echo "$review_output"
                exit 1
              fi
            else
              echo "❌ No API key available for fallback"
              echo "Please complete the OAuth authentication manually using the URL above."
              echo ""
              echo "Full CLI output for debugging:"
              echo "$review_output"
              exit 1
            fi
          fi
          
          # Debug: Check the output
          if [ -n "$review_output" ]; then
            echo "✅ Review output generated (${#review_output} characters)"
            echo "First 200 characters of review:"
            echo "$review_output" | head -c 200
          else
            echo "❌ No review output generated"
            echo "Exit code: $exit_code"
            echo "Full CLI output for debugging:"
            echo "$review_output"
            echo "This might indicate an authentication or CLI issue"
            exit 1
          fi
          
          # Clean up
          rm /tmp/review_prompt.txt
          rm -f $HOME/.gemini/settings.json
          rm -f $HOME/.gemini/oauth_creds.json
          
          # Use a unique delimiter for GITHUB_OUTPUT
          DELIMITER=$(openssl rand -hex 16)
          
          echo "review<<$DELIMITER" >> $GITHUB_OUTPUT
          echo "$review_output" >> $GITHUB_OUTPUT
          echo "$DELIMITER" >> $GITHUB_OUTPUT

      - name: Post Review Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment $PR_NUMBER --body "**Gemini Code Review:**\n\n${{ steps.gemini_review.outputs.review }}"
